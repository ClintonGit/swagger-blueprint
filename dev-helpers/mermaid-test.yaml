paths:
  /diagrams:
    get:
      summary: List all diagram types
      description: |
        Returns metadata for all supported Mermaid diagram types.

        ![Endpoint Overview](https://placehold.co/500x120/0f1623/6366f1?text=GET+%2Fdiagrams&font=montserrat)

        ### Supported Types

        ```mermaid
        mindmap
          root((Diagram Types))
            Flow
              flowchart TD
              flowchart LR
              flowchart RL
              flowchart BT
            Sequence
              sequenceDiagram
            Data Model
              classDiagram
              erDiagram
            Behavior
              stateDiagram-v2
              journey
            Planning
              gantt
              timeline
            Analytics
              pie
              xychart-beta
              quadrantChart
            Architecture
              gitGraph
              mindmap
        ```

        | Type | Directive | Use Case |
        |------|-----------|----------|
        | Flowchart | `flowchart TD/LR` | Process flows |
        | Sequence | `sequenceDiagram` | API interactions |
        | Class | `classDiagram` | Data models |
        | State | `stateDiagram-v2` | State machines |
        | ER | `erDiagram` | Database schema |
        | Gantt | `gantt` | Project timelines |
        | Pie | `pie` | Distributions |
        | Git | `gitGraph` | Branch history |
        | Journey | `journey` | User flows |
        | Mindmap | `mindmap` | Concept maps |
        | Timeline | `timeline` | History |
        | Quadrant | `quadrantChart` | Priority matrix |
        | XY Chart | `xychart-beta` | Metrics over time |

      responses:
        "200":
          description: List of diagram types

  /diagrams/class:
    get:
      summary: Class diagram example
      description: |
        Domain model for the Orders system.

        ```mermaid
        classDiagram
          class Order {
            +UUID id
            +OrderStatus status
            +Decimal total
            +place() void
            +cancel() void
            +refund(amount) bool
          }

          class OrderItem {
            +UUID orderId
            +UUID productId
            +int qty
            +Decimal price
          }

          class OrderStatus {
            <<enumeration>>
            PENDING
            PROCESSING
            SHIPPED
            DELIVERED
            CANCELLED
          }

          Order "1" *-- "1..*" OrderItem : contains
          Order --> OrderStatus : has
        ```
      responses:
        "200":
          description: OK
