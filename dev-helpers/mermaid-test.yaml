openapi: 3.0.0
info:
  title: Mermaid Complete Diagram Gallery
  version: 2.0.0
  description: |
    # Mermaid Diagram Gallery

    รวมตัวอย่าง Mermaid ทุกประเภท พร้อมภาพประกอบ

    ![Gallery Banner](https://placehold.co/800x160/0f1623/6366f1?text=Mermaid+Diagram+Gallery&font=montserrat)

    ---

    ## 1. Flowchart — Top-Down (`TD`)

    ```mermaid
    flowchart TD
      A([Start]) --> B{Is User Logged In?}
      B -- Yes --> C[Load Dashboard]
      B -- No  --> D[Show Login Page]
      D --> E[/Enter Credentials/]
      E --> F{Valid?}
      F -- Yes --> G[(Save Session)]
      F -- No  --> H[Show Error]
      H --> E
      G --> C
      C --> I([End])

      style A fill:#6366f1,color:#fff,stroke:#818cf8
      style I fill:#6366f1,color:#fff,stroke:#818cf8
      style F fill:#1e1b4b,color:#e2e8f0,stroke:#6366f1
      style B fill:#1e1b4b,color:#e2e8f0,stroke:#6366f1
    ```

    ---

    ## 2. Flowchart — Left-Right (`LR`)

    ```mermaid
    flowchart LR
      Client -->|REST| GW[API Gateway]
      GW -->|route /users| US[User Service]
      GW -->|route /orders| OS[Order Service]
      GW -->|route /pay| PS[Payment Service]
      US --- DB1[(Users DB)]
      OS --- DB2[(Orders DB)]
      PS --- DB3[(Payment DB)]
      PS -->|webhook| OS

      style GW fill:#6366f1,color:#fff,stroke:#818cf8
    ```

    ---

    ## 3. Flowchart — Right-Left (`RL`)

    ```mermaid
    flowchart RL
      Report --> Aggregate
      Aggregate --> Transform
      Transform --> Ingest
      Ingest --> SourceA[(S3 Bucket)]
      Ingest --> SourceB[(Kafka)]
      Ingest --> SourceC[(Postgres)]
    ```

    ---

    ## 4. Flowchart — Bottom-Top (`BT`)

    ```mermaid
    flowchart BT
      DB[(Database)] --> ORM[ORM Layer]
      ORM --> Service[Business Service]
      Service --> Controller[REST Controller]
      Controller --> Client
    ```

    ---

    ## 5. Flowchart — Subgraph

    ```mermaid
    flowchart TD
      subgraph Frontend
        UI[React App] --> Store[Redux Store]
      end

      subgraph Backend
        API[Express API] --> Auth[Auth Middleware]
        Auth --> Handler[Route Handler]
        Handler --> DB[(PostgreSQL)]
      end

      subgraph Infra
        CDN[CloudFront] --> UI
        LB[Load Balancer] --> API
      end

      Store -->|HTTP| LB
    ```

    ---

    ## 6. Sequence Diagram

    ```mermaid
    sequenceDiagram
      autonumber
      actor U as User
      participant FE as Frontend
      participant GW as API Gateway
      participant AS as Auth Service
      participant DB as Database

      U->>FE: Fill login form
      FE->>GW: POST /auth/login
      GW->>AS: Validate credentials
      AS->>DB: SELECT user WHERE email=?
      DB-->>AS: user row
      AS-->>GW: JWT token
      GW-->>FE: 200 { token }
      FE->>FE: Store token
      FE-->>U: Redirect to dashboard

      Note over AS,DB: Token expires in 1h
    ```

    ---

    ## 7. Class Diagram

    ```mermaid
    classDiagram
      class Animal {
        +String name
        +int age
        +makeSound() String
      }

      class Dog {
        +String breed
        +fetch() void
      }

      class Cat {
        +bool indoor
        +purr() void
      }

      class Owner {
        +String name
        +List~Animal~ pets
        +adopt(Animal) void
      }

      Animal <|-- Dog
      Animal <|-- Cat
      Owner "1" --> "0..*" Animal : owns
    ```

    ---

    ## 8. State Diagram

    ```mermaid
    stateDiagram-v2
      [*] --> Draft

      state "In Review" as IR {
        [*] --> PeerReview
        PeerReview --> LeadReview : approved
        PeerReview --> Rejected : changes needed
        LeadReview --> Approved : sign-off
        LeadReview --> Rejected : major issues
      }

      Draft --> IR : submit
      Rejected --> Draft : revise
      Approved --> Published : deploy
      Published --> Archived : sunset
      Archived --> [*]
    ```

    ---

    ## 9. ER Diagram

    ```mermaid
    erDiagram
      USER {
        uuid id PK
        string email UK
        string name
        datetime created_at
      }

      ORDER {
        uuid id PK
        uuid user_id FK
        string status
        decimal total
        datetime placed_at
      }

      ORDER_ITEM {
        uuid id PK
        uuid order_id FK
        uuid product_id FK
        int quantity
        decimal unit_price
      }

      PRODUCT {
        uuid id PK
        string name
        decimal price
        int stock
      }

      USER ||--o{ ORDER : places
      ORDER ||--|{ ORDER_ITEM : contains
      PRODUCT ||--o{ ORDER_ITEM : "included in"
    ```

    ---

    ## 10. Gantt Chart

    ```mermaid
    gantt
      title API v2.0 Release Plan
      dateFormat YYYY-MM-DD
      excludes weekends

      section Design
