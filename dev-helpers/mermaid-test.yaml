      section Backend
        Auth Service       :done,    be1, 2024-01-15, 2024-02-01
        User Service       :active,  be2, 2024-02-01, 2024-02-20
        Order Service      :         be3, 2024-02-15, 2024-03-05

      section Frontend
        Login Flow         :done,    fe1, 2024-01-20, 2024-02-05
        Dashboard          :active,  fe2, 2024-02-05, 2024-02-25
        Order Flow         :         fe3, 2024-02-20, 2024-03-10

      section Launch
        QA Testing         :crit,    qa1, 2024-03-05, 2024-03-15
